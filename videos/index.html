<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videos — cabbibo</title>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <canvas id="c"></canvas>

  <div id="ui">
    <div id="site-title"></div>
    <div id="breadcrumb"></div>
    <div id="now-playing"></div>
  </div>

  <div id="folder-tree"></div>

  <div id="vid-overlay">
    <button id="vid-close">✕</button>
    <video id="vid" playsinline crossorigin="anonymous"></video>
    <div id="vid-loading">loading</div>
    <div id="scrub">
      <button id="scrub-play">▶</button>
      <span id="scrub-time">0:00</span>
      <div id="scrub-track"><div id="scrub-fill"></div></div>
      <span id="scrub-dur">0:00</span>
      <button id="scrub-fs">⤢</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="config/secrets.js"></script>
  <script src="js/drive.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
