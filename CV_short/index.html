<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Isaac Cohen / Cabbibo — Highlights</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --card-bg: #111;
      --accent: #fff;
      --dim: #666;
      --border: #222;
      --font-body: Georgia, "Times New Roman", serif;
      --font-ui: -apple-system, Helvetica, Arial, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--accent);
      font-family: var(--font-body);
      margin: 0;
      padding: 0;
    }

    /* ---- Header ---- */
    .page-header {
      padding: 4rem 2rem 3rem;
      max-width: 900px;
      margin: 0 auto;
      border-bottom: 1px solid var(--border);
    }
    .page-header h1 {
      font-family: var(--font-ui);
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 0 0 0.4rem;
    }
    .page-header p {
      font-family: var(--font-ui);
      font-size: 0.85rem;
      color: var(--dim);
      margin: 0;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ---- Items ---- */
    .items-list {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
    }

    .item-card {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border-bottom: 1px solid var(--border);
      padding: 3.5rem 0;
      align-items: start;
    }
    .item-card:first-child { padding-top: 3.5rem; }

    .item-image-wrap {
      position: relative;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: #1a1a1a;
    }
    .item-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }
    .item-card:hover .item-image-wrap img {
      transform: scale(1.04);
    }
    .item-no-image {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-ui);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #333;
    }

    .item-content {
      padding: 0 0 0 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .item-meta {
      font-family: var(--font-ui);
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .item-title {
      font-size: clamp(1.1rem, 2.5vw, 1.6rem);
      font-weight: bold;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin: 0;
    }

    .item-bullets {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .item-bullets li {
      font-size: 0.9rem;
      line-height: 1.55;
      color: #bbb;
      padding-left: 1.2em;
      position: relative;
    }
    .item-bullets li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--dim);
    }

    .item-link {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.45rem 1.1rem;
      border: 1px solid #333;
      color: #fff;
      text-decoration: none;
      font-family: var(--font-ui);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: background 0.2s, border-color 0.2s;
      align-self: flex-start;
    }
    .item-link:hover {
      background: #fff;
      color: #000;
      border-color: #fff;
    }

    /* ---- Empty state ---- */
    .empty {
      padding: 6rem 2rem;
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
      font-family: var(--font-ui);
      font-size: 0.85rem;
      color: var(--dim);
      line-height: 1.7;
    }
    .empty strong { color: #777; }

    /* ---- Responsive ---- */
    @media (max-width: 640px) {
      .item-card {
        grid-template-columns: 1fr;
        gap: 1.5rem;
        padding: 2.5rem 0;
      }
      .item-content {
        padding: 0;
      }
      .items-list { padding: 0 1.2rem 4rem; }
      .page-header { padding: 2.5rem 1.2rem 2rem; }
    }

    @media print {
      body { background: #fff; color: #000; }
      :root { --bg: #fff; --card-bg: #fff; --accent: #000; --dim: #555; --border: #ddd; }
      .item-link { border-color: #aaa; color: #000; }
      .item-bullets li { color: #333; }
    }
  </style>
</head>
<body>

  <!-- Hidden placeholders so ../CV/script.js bootstrap doesn't throw -->
  <div id="work-categories" style="display:none"></div>
  <ul id="press-list" style="display:none"></ul>
  <ul id="contact-links" style="display:none"></ul>
  <span id="year" style="display:none"></span>
  <button class="nav-toggle" style="display:none" aria-expanded="false" aria-controls="nav-links"></button>
  <ul id="nav-links" style="display:none"></ul>

  <header class="page-header">
    <h1>Isaac Cohen</h1>
    <p>Cabbibo &nbsp;·&nbsp; Simulation Artist &nbsp;·&nbsp; Los Angeles</p>
  </header>

  <div id="app"></div>

  <script src="../CV/script.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const app = document.getElementById('app');

    // Read star data from localStorage
    let org = {};
    try { org = JSON.parse(localStorage.getItem('cv-organizer-v3') || '{}'); } catch(e) {}

    // Find 5-star items
    const fiveStars = new Set(
      Object.entries(org)
        .filter(([, v]) => v && v.stars === 5)
        .map(([title]) => title)
    );

    // Build lookup: title → item data
    const lookup = new Map();
    for (const cat of CATEGORIES) {
      for (const item of cat.items) {
        if (!lookup.has(item.title)) lookup.set(item.title, item);
      }
    }

    // Resolve thumb URL (mirrors deriveThumb logic from CV/script.js)
    function getThumb(item) {
      if (item.thumb) return item.thumb;
      const link = item.links && item.links[0];
      if (!link) return null;
      const url = link.url;
      // YouTube
      const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
      if (yt) return `https://img.youtube.com/vi/${yt[1]}/hqdefault.jpg`;
      // Steam
      const steam = url.match(/store\.steampowered\.com\/app\/(\d+)/);
      if (steam) return `https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${steam[1]}/header.jpg`;
      // GitHub
      const gh = url.match(/github\.com\/([^/]+)\/([^/?#]+)/);
      if (gh) return `https://opengraph.githubassets.com/1/${gh[1]}/${gh[2]}`;
      // Vimeo
      const vimeo = url.match(/vimeo\.com\/(\d+)/);
      if (vimeo) return `https://vumbnail.com/${vimeo[1]}.jpg`;
      return null;
    }

    // Collect ordered 5-star items (My Favs order first, then others)
    const seen = new Set();
    const ordered = [];
    for (const cat of CATEGORIES) {
      for (const item of cat.items) {
        if (fiveStars.has(item.title) && !seen.has(item.title)) {
          seen.add(item.title);
          ordered.push(item);
        }
      }
    }

    if (ordered.length === 0) {
      app.innerHTML = `<div class="empty">
        <p><strong>No 5-star items yet.</strong></p>
        <p>Open the CV, give items 5 stars in the tagger at the bottom,<br>then return here to see your highlights.</p>
      </div>`;
      return;
    }

    const list = document.createElement('div');
    list.className = 'items-list';

    ordered.forEach(item => {
      const card = document.createElement('div');
      card.className = 'item-card';

      // Image
      const imgWrap = document.createElement('div');
      imgWrap.className = 'item-image-wrap';
      const thumb = getThumb(item);
      if (thumb) {
        const img = document.createElement('img');
        img.src = thumb;
        img.alt = item.title;
        img.loading = 'lazy';
        imgWrap.appendChild(img);
      } else {
        const ph = document.createElement('div');
        ph.className = 'item-no-image';
        ph.textContent = 'no image';
        imgWrap.appendChild(ph);
      }

      // Content
      const content = document.createElement('div');
      content.className = 'item-content';

      // Meta line
      const metaParts = [];
      if (item.collab) metaParts.push(item.collab);
      if (item.year)   metaParts.push(item.year);
      if (metaParts.length) {
        const meta = document.createElement('div');
        meta.className = 'item-meta';
        meta.textContent = metaParts.join(' · ');
        content.appendChild(meta);
      }

      // Title
      const title = document.createElement('h2');
      title.className = 'item-title';
      title.textContent = item.title;
      content.appendChild(title);

      // Bullets or desc
      const bulletSrc = item.bullets || (item.desc ? [item.desc] : null);
      if (bulletSrc && bulletSrc.length) {
        const ul = document.createElement('ul');
        ul.className = 'item-bullets';
        bulletSrc.forEach(b => {
          const li = document.createElement('li');
          li.textContent = b;
          ul.appendChild(li);
        });
        content.appendChild(ul);
      }

      // Link
      if (item.links && item.links[0]) {
        const a = document.createElement('a');
        a.className = 'item-link';
        a.href = item.links[0].url;
        a.target = '_blank';
        a.rel = 'noopener';
        a.textContent = item.links[0].label || 'View';
        content.appendChild(a);
      }

      card.appendChild(imgWrap);
      card.appendChild(content);
      list.appendChild(card);
    });

    app.appendChild(list);
  });
  </script>
</body>
</html>
